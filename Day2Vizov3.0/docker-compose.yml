version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: day2vizov_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: Day2VizovDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: day2vizov_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=Day2VizovDb;Username=postgres;Password=postgres123
      - JwtSettings__Secret=YOUR_SUPER_SECRET_KEY_FOR_JWT_WITH_32_CHARS_PLUS_SOME
      - VkSettings__GroupToken=ВАШ_ТОКЕН_ГРУППЫ
      - VkSettings__AdminUserId=734324233
      - VkSettings__ApiVersion=5.131
    depends_on:
      - postgres
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data: